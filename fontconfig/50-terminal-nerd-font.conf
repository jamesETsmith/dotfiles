<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Prefer Hack Nerd Font Mono for terminal monospace rendering -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Hack Nerd Font Mono</family>
      <family>MesloLGS NF</family>
    </prefer>
  </alias>

  <!-- Nerd-patched fonts can be misclassified as proportional -->
  <match target="scan">
    <test name="family">
      <string>Hack Nerd Font Mono</string>
    </test>
    <edit name="spacing" mode="assign">
      <int>90</int>
    </edit>
  </match>
  <match target="scan">
    <test name="family">
      <string>MesloLGS NF</string>
    </test>
    <edit name="spacing" mode="assign">
      <int>90</int>
    </edit>
  </match>
</fontconfig>
