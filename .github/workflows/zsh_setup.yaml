name: ZSH Setup
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup ZSH
        run: bash ci/measure-step.sh "Setup ZSH" bash setup-zsh.sh
      - name: Verify installed binaries
        run: |
          bash ci/measure-step.sh "Verify installed binaries" bash -c '
            export PATH="${HOME}/.local/bin:${PATH}"
            for tool in zsh git curl starship uv; do
              if ! command -v "${tool}" >/dev/null 2>&1; then
                echo "FAIL: ${tool} not found on PATH"
                exit 1
              fi
              echo "OK: ${tool} -> $(command -v "${tool}")"
            done
          '
      - name: Verify PATH includes local bin
        run: |
          bash ci/measure-step.sh "Verify PATH includes local bin" bash -c '
            source "${HOME}/.zshrc" 2>/dev/null || true
            case ":${PATH}:" in
              *":${HOME}/.local/bin:"*)
                echo "OK: ~/.local/bin is in PATH"
                ;;
              *)
                echo "FAIL: ~/.local/bin not in PATH"
                exit 1
                ;;
            esac
          '
      - name: Verify config files
        run: |
          bash ci/measure-step.sh "Verify config files" bash -c '
            files=(
              "${HOME}/.zshrc"
              "${HOME}/.config/starship.toml"
              "${HOME}/.oh-my-zsh"
            )
            for f in "${files[@]}"; do
              if [[ ! -e "${f}" ]]; then
                echo "FAIL: missing: ${f}"
                exit 1
              fi
              echo "OK: ${f}"
            done
          '
      - name: Verify zsh plugins installed
        run: |
          bash ci/measure-step.sh "Verify zsh plugins installed" bash -c '
            zsh_custom="${HOME}/.oh-my-zsh/custom"
            for plugin in zsh-autosuggestions zsh-syntax-highlighting; do
              if [[ ! -d "${zsh_custom}/plugins/${plugin}" ]]; then
                echo "FAIL: plugin missing: ${plugin}"
                exit 1
              fi
              echo "OK: plugin ${plugin}"
            done
          '
      - name: Verify zshrc is valid zsh syntax
        run: bash ci/measure-step.sh "Verify zshrc syntax" zsh -n "${HOME}/.zshrc"
      - name: Upload timing data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zsh-setup-timings-${{ github.sha }}
          path: .ci-timings/timings.jsonl
          if-no-files-found: warn
